name: Banking Project CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

# CI Hardening: Principle of least privilege
permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build and run tests
        run: mvn -B clean test

      - name: Build Docker image
        run: docker build -t banking-java:ci .

      # CI Hardening: Security scan for vulnerabilities in dependencies/image
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'banking-java:ci'
          format: 'table'
          exit-code: '0' # Set to 1 to fail the build on HIGH/CRITICAL vulnerabilities
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
