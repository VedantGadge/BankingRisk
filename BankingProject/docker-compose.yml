version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: banking_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-banking_db}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - banking_network

  # Banking Application
  banking-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: banking_app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      ollama:
        condition: service_started
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-banking_db}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_POOL_SIZE: 10
      DB_MIN_IDLE: 5
      DDL_AUTO: ${DDL_AUTO:-update}
      SHOW_SQL: ${SHOW_SQL:-false}
      SERVER_PORT: 8080
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # Override datasource URL to disable SSL locally
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-banking_db}?sslmode=disable
      # Spring AI connection to local Ollama container
      SPRING_AI_OPENAI_BASE_URL: http://ollama:11434/v1
      SPRING_AI_OPENAI_API_KEY: ollama
      SPRING_AI_OPENAI_CHAT_OPTIONS_MODEL: llama3.2
    ports:
      - "8080:8080"
    networks:
      - banking_network

  # Redis Cache & Rate Limiting
  redis:
    image: redis:7-alpine
    container_name: banking_redis
    ports:
      - "6379:6379"
    networks:
      - banking_network

  # Ollama Local LLM Runner
  ollama:
    image: ollama/ollama:latest
    container_name: banking_ollama
    volumes:
      - ollama_data:/root/.ollama
    expose:
      - "11434"
    networks:
      - banking_network
    restart: unless-stopped

volumes:
  postgres_data:
  ollama_data:

networks:
  banking_network:
    driver: bridge

